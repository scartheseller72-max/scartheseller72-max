name: Generate 3D Contribution Graph

# Renders the 3D contribution graph SVGs (profile-3d-contrib/) and commits
# them to main, where the profile README embeds the night view. Runs daily
# and on manual dispatch.

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-profile-3d
  cancel-in-progress: true

jobs:
  profile-3d:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate 3D contribution SVGs
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/
          git diff --cached --quiet || git commit -m "chore: update 3D contribution graph"
          git push origin main
